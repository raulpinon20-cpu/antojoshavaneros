<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antojos Havaneros</title>

<style>
body{
  margin:0;
  font-family: Georgia, serif;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#002A8F;
  color:white;
  text-align:center;
  padding:25px 10px;
  font-size:34px;
  font-weight:bold;
  border-radius:0 0 25px 25px;
}

/* CONTACTOS */
.contact-box{
  background:white;
  margin:20px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.contact-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  background:#fafafa;
  text-decoration:none;
  color:black;
  font-size:16px;
}

.contact-item img{
  width:28px;
  height:28px;
}

/* TITULOS */
h2{
  text-align:center;
  color:#002A8F;
  margin-top:25px;
  font-size:28px;
}

.subtitle{
  text-align:center;
  color:gray;
  margin-bottom:10px;
}

/* CARRUSEL */
.carousel{
  position:relative;
  max-width:90%;
  margin:auto;
  overflow:hidden;
  border-radius:20px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);

  /* ✅ EVITA LOS “SALTOS” (altura fija para que no cambie el layout) */
  height: 380px;
}

/* ✅ Las imágenes ocupan toda el área sin achicarse raro */
.carousel img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
  cursor:pointer;
}

.carousel img.active{
  display:block;
}

/* BOTONES (OCULTOS) */
.controls{
  text-align:center;
  margin:10px;
}
.controls button{
  display:none;
}

/* ZOOM */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal img{
  max-width:90%;
  max-height:90%;
}

.modal.active{
  display:flex;
}

/* MENU */
.menu img{
  width:90%;
  display:block;
  margin:20px auto;
  border-radius:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- HEADER -->
<header>Antojos Havaneros</header>

<!-- CONTACTOS -->
<div class="contact-box">

  <a class="contact-item" href="https://wa.me/19087680702" target="_blank" rel="noopener">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    WhatsApp: 908-768-0702
  </a>

  <a class="contact-item" href="https://instagram.com/antojos_havaneros" target="_blank" rel="noopener">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">
    Instagram: @antojos_havaneros
  </a>

  <a class="contact-item" href="https://www.tiktok.com/@antojoshavaneros?_r=1&_t=ZT-93g3vJgVixC" target="_blank" rel="noopener">
    <!-- ✅ ICONO TIKTOK FIJO (NO SE DESAPARECE EN MÓVIL) -->
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
    TikTok: @antojoshavaneros
  </a>

</div>

<!-- CAKES -->
<h2>Cakes</h2>
<div class="subtitle">Desliza o pausa</div>
<div class="carousel" id="cakes"></div>
<div class="controls"><button onclick="toggle('cakes')">Pausar / Seguir</button></div>

<!-- DULCES -->
<h2>Dulces</h2>
<div class="subtitle">Desliza o pausa</div>
<div class="carousel" id="dulces"></div>
<div class="controls"><button onclick="toggle('dulces')">Pausar / Seguir</button></div>

<!-- SALADOS -->
<h2>Salados</h2>
<div class="subtitle">Desliza o pausa</div>
<div class="carousel" id="salados"></div>
<div class="controls"><button onclick="toggle('salados')">Pausar / Seguir</button></div>

<!-- MENU -->
<h2>Menú</h2>
<div class="menu">
  <img src="page-01.webp" alt="Menú 1">
  <img src="page-02.webp" alt="Menú 2">
  <img src="page-03.webp" alt="Menú 3">
  <img src="page-04.webp" alt="Menú 4">
  <img src="page-05.webp" alt="Menú 5">
  <img src="page-06.webp" alt="Menú 6">
  <img src="page-07.webp" alt="Menú 7">
  <img src="page-08.webp" alt="Menú 8">
  <img src="page-09.webp" alt="Menú 9">
  <img src="page-10.webp" alt="Menú 10">
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg" alt="Zoom">
</div>

<script>
/* CONFIG */
const carousels = {
  cakes:   { total: 20, index: 0, play: true, prefix: "cake"   },
  dulces:  { total: 16, index: 0, play: true, prefix: "dulce"  },
  salados: { total:  7, index: 0, play: true, prefix: "salado" }
};

/* CARGAR IMAGENES */
function load(id){
  const box = document.getElementById(id);

  for(let i=1;i<=carousels[id].total;i++){
    const num = i.toString().padStart(2,"0");
    const img = document.createElement("img");
    img.src = carousels[id].prefix + "-" + num + ".jpg";
    if(i===1) img.classList.add("active");

    /* ✅ TOCAR: PAUSA/SEGUIR + AGRANDAR */
    img.onclick = () => {
      toggle(id);
      openModal(img.src);
    };

    box.appendChild(img);
  }
}

load("cakes");
load("dulces");
load("salados");

/* AUTO */
setInterval(() => {
  for(const id in carousels){
    if(!carousels[id].play) continue;

    const imgs = document.querySelectorAll("#"+id+" img");
    imgs[carousels[id].index].classList.remove("active");

    carousels[id].index = (carousels[id].index + 1) % imgs.length;

    imgs[carousels[id].index].classList.add("active");
  }
}, 2000);

/* PAUSA */
function toggle(id){
  carousels[id].play = !carousels[id].play;
}

/* ZOOM */
function openModal(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}
</script>

</body>
</html>
